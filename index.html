<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>呑み迷子 - NOMI-MAIGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <script>
    (function(d) {
        var config = {
            kitId: 'gpu6rtb',
            scriptTimeout: 3000,
            async: true
        },
        h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)
    })(document);
    </script>

    <style>
        body {
            margin: 0;
            font-family: "hot-gekai11kk", "Sawarabi Mincho", serif;
            background-image: url('BG.png'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container, .maigo-fuda {
            background-color: rgba(255, 255, 255, 0.6) !important; 
            border-radius: 15px;
        }

        h2, h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        .order-hint {
            font-family: "ab-ootori", sans-serif;
            font-size: 28px;
            font-weight: 400;
            margin: 20px 0;
            text-align: center;
        }

        /* ミッション画面専用の調整 */
        #mission-screen .order-hint {
            font-size: 20px; /* 改行防止のため小さく設定 */
            margin: 15px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mission-unit { margin-bottom: 10px; }
        .mission-btns { display: flex; justify-content: space-around; gap: 10px; }

        /* 画像ボタンのスタイル */
        .m-img-btn {
            width: 130px; /* 達成・失敗ボタンの横幅 */
            height: auto;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .m-img-btn:active { transform: scale(0.95); }

        .f-img-btn {
            width: 140px; /* 下部ボタンの横幅 */
            height: auto;
            cursor: pointer;
        }

        .footer-btns { 
            display: flex; 
            justify-content: space-around; 
            margin-top: 30px; 
            width: 100%;
        }
        .m-img-btn {
    width: 140px;
    height: auto;
    cursor: pointer;
    transition: transform 0.2s, opacity 0.2s; /* アニメーション設定 */
}

/* 選択されたボタン（大きく表示） */
.m-img-btn.selected {
    transform: scale(1.1); /* 1.1倍に拡大 */
    opacity: 1;
}

/* 選択しなかったボタン（暗く表示） */
.m-img-btn.dimmed {
    transform: scale(1); 
    opacity: 0.3; /* 暗くする */
}

        /* 以下、既存のレイアウト維持用CSS */
        header { width: 100%; padding: 30px 0 10px; display: flex; justify-content: center; align-items: center; }
        .container, .maigo-fuda { width: 92%; max-width: 400px; margin: 20px auto; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
        .section-title { text-align: center; margin-top: 0; font-size: 1.2rem; }
        .shop-card { display: flex; align-items: center; background: #fff; border: 1px solid #1a237e; margin-bottom: 12px; padding: 10px; text-align: left; }
        /* お店情報専用のフォント設定 */
.shop-desc {
    font-family: sans-serif !important;
    font-size: 0.9rem; /* 必要に応じてサイズ調整してください */
    line-height: 1.4;
}
    </style>
</head>

<body>

<div id="mission-screen" class="container" style="display: none;">
    <h2 class="section-title">お店</h2>
    <div id="selected-shop-card"></div>

    <div id="first-mission-unit" class="mission-unit" style="margin-top:20px; border-top:1px dashed #ccc; padding-top:20px;">
    <h3 class="section-title">迷子札</h3>
    <div id="mission-drink-hint" class="order-hint"></div>
    <div class="mission-btns">
        <img src="fail.png" class="m-img-btn" alt="失敗">
        <img src="achievement.png" class="m-img-btn" alt="達成">
    </div>
</div>

    <div id="dynamic-mission-container"></div>

    <div class="footer-btns">
        <img src="exit.png" class="f-img-btn" onclick="location.reload()" alt="店を出る">
        <img src="next.png" class="f-img-btn" onclick="getNextMission()" alt="次の迷子札">
    </div>
</div>

<header>
    <div class="logo-area">
        <img src="logo.png" alt="呑み迷子" style="width: 150px; height: auto;">
    </div>
</header>

<div class="container">
    <h2 class="section-title">お店候補</h2>
    <div id="shop-list"></div> 
</div>

<div class="maigo-fuda">
    <h3 class="section-title">迷子札</h3>
    <div id="drink-hint" class="order-hint">一杯目は何頼む？</div>
</div>

<div id="button-container" style="text-align: center;">
    <img id="action-button" src="search.png" onclick="startGacha()" style="cursor: pointer; width: 300px; max-width: 80%;">
</div>

<div class="mission-btns">
    <img src="fail.png" class="m-img-btn" onclick="selectResult(this, false)" alt="失敗">
    <img src="achievement.png" class="m-img-btn" onclick="selectResult(this, true)" alt="達成">
</div>

<script>
// 1. お店を表示する関数
function displayShops(data, currentRange) {
    const shopList = document.getElementById('shop-list');
    const hint = document.getElementById('drink-hint');
    const drinks = ["生ビール", "ハイボール", "レモンサワー", "日本酒", "焼酎", "ウーロン茶", "カシオレ", "トマトハイ"];

    // 迷子札の内容を決定
    if(hint) {
        const randomDrink = drinks[Math.floor(Math.random() * drinks.length)];
        hint.innerText = "一杯目は " + randomDrink;
    }

    if(!shopList) return;
    shopList.innerHTML = "";

    if (!data || !data.results || !data.results.shop || data.results.shop.length === 0) {
        shopList.innerHTML = '<p style="text-align:center;">近くにお店が見つかりませんでした。</p>';
        return;
    }

    // 検索範囲を表示
    const rangeText = document.createElement('p');
    rangeText.style = "font-size:0.8rem; color:#666; text-align:center;";
    rangeText.innerText = `(${currentRange}以内の結果)`;
    shopList.appendChild(rangeText);

    // 3件ランダムに抽出
    const shops = data.results.shop.sort(() => 0.5 - Math.random()).slice(0, 3);

    shops.forEach(shop => {
        const shopCard = document.createElement('div');
        shopCard.className = 'shop-card';
        shopCard.style = "display:flex; align-items:center; background:#fff; border:1px solid #1a237e; margin-bottom:10px; padding:10px; cursor:pointer; border-radius:10px;";

        shopCard.innerHTML = `
            <img src="${shop.photo.pc.l}" style="width:80px; height:80px; object-fit:cover; margin-right:15px; border-radius:10px;">
            <div style="flex:1;">
                <div class="shop-desc" style="font-weight:bold; margin-bottom:5px;">${shop.name}</div>
                <div class="shop-desc">${shop.genre.name}<br>${shop.access}</div>
            </div>
        `;

       // お店をクリックした時の処理
       shopCard.onclick = () => {
    // 1. メイン画面の要素をすべて隠す（ミッション画面以外）
    const selectors = ['header', '.container', '.maigo-fuda', '#button-container'];
    selectors.forEach(sel => {
        document.querySelectorAll(sel).forEach(el => {
            if (!document.getElementById('mission-screen').contains(el)) {
                el.style.display = 'none';
            }
        });
    });

    // 2. 選択したカードのDOMノード自体をミッション画面に移動させる
    const selectedPlace = document.getElementById('selected-shop-card');
    if (selectedPlace) {
        selectedPlace.innerHTML = ''; // 一旦空にする
        // ここでクローンを作るか、移動させることでレイアウトを維持
        selectedPlace.appendChild(shopCard.cloneNode(true));
        // 移動した先でクリックを無効化（リンク移動などを防ぐ）
        selectedPlace.querySelector('.shop-card').onclick = null;
    }

    // 3. 「一杯目」の指令をセット
    const hint = document.getElementById('drink-hint');
    const missionDrinkHint = document.getElementById('mission-drink-hint');
    if (hint && missionDrinkHint) {
        missionDrinkHint.innerText = hint.innerText.replace("一杯目は", "一杯目に") + " を頼め";
    }

    // 4. ミッション画面を表示
    document.getElementById('mission-screen').style.display = 'block';
};
        shopList.appendChild(shopCard);
    });
}

// 2. 次のミッションを追加する関数
function getNextMission() {
    const container = document.getElementById('dynamic-mission-container');
    if (!container) return;

    const tasks = [
        "店主のおすすめを聞け",
        "隣の人と乾杯せよ",
        "本日のおすすめを注文せよ",
        "一番人気のつまみを頼め",
        "店員さんの名前を覚えろ",
        "揚げ物を1品頼め",
        "自分以外が頼んだ酒を頼め",
        "おすすめの日本酒を聞け"
    ];
    const randomTask = tasks[Math.floor(Math.random() * tasks.length)];

    const newMission = document.createElement('div');
    newMission.className = 'mission-unit';
    newMission.style.cssText = "margin-top:10px; border-top:1px dashed #ccc; padding-top:10px;";

    newMission.innerHTML = `
        <h3 class="order-hint">${randomTask}</h3>
        <div class="mission-btns">
            <img src="fail.png" class="m-img-btn" onclick="this.style.opacity='0.5'" alt="失敗">
            <img src="achievement.png" class="m-img-btn" onclick="this.style.opacity='0.5'" alt="達成">
        </div>
    `;
    container.appendChild(newMission);
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

// 3. データ取得
async function fetchAndDisplay(lat, lng, rangeIndex = 1) {
    const shopList = document.getElementById('shop-list');
    const rangeLabels = {1: "300m", 2: "500m", 3: "1000m"};
    if(shopList) shopList.innerHTML = `<p style="text-align:center;">${rangeLabels[rangeIndex]}圏内を探索中...</p>`;

    try {
        const response = await fetch(`/getShops?lat=${lat}&lng=${lng}&range=${rangeIndex}`);
        const data = await response.json();
        if ((!data.results || !data.results.shop || data.results.shop.length === 0) && rangeIndex < 3) {
            return fetchAndDisplay(lat, lng, rangeIndex + 1);
        }
        displayShops(data, rangeLabels[rangeIndex]);
    } catch (e) {
        if(shopList) shopList.innerHTML = '<p style="text-align:center;">通信エラーが発生しました。</p>';
    }
}

// 4. ガチャ開始
function startGacha() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => fetchAndDisplay(pos.coords.latitude, pos.coords.longitude),
            () => alert("位置情報を許可してください")
        );
    }
}

function selectResult(button, isSuccess) {
    // ボタンの親要素（mission-btns）を取得
    const parent = button.parentElement;
    const buttons = parent.querySelectorAll('.m-img-btn');
    
    // 一旦クラスをすべてリセット
    buttons.forEach(btn => btn.classList.remove('selected', 'dimmed'));
    
    // クリックされたボタンには selected、もう片方には dimmed を付与
    button.classList.add('selected');
    buttons.forEach(btn => {
        if (btn !== button) {
            btn.classList.add('dimmed');
        }
    });
}
</script>
<footer style="text-align: center; margin-top: 50px; margin-bottom: 20px; font-family: sans-serif; font-size: 0.8rem; color: #666;">
    <p>
        Powered by <a href="http://webservice.recruit.co.jp/" target="_blank" rel="noopener" style="color: #666; text-decoration: underline;">ホットペッパーグルメ Webサービス</a>
    </p>
</footer>
</body>
</html>
