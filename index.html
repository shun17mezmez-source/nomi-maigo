<head>
    <meta charset="UTF-8">

    <title>呑み迷子 - NOMI-MAIGO</title>
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <script>
    (function(d) {
        var config = {
            kitId: 'gpu6rtb',

        h=d.documentElement,t=setTimeout(function(){h.className=h.className.replace(/\bwf-loading\b/g,"")+" wf-inactive";},config.scriptTimeout),tk=d.createElement("script"),f=false,s=d.getElementsByTagName("script")[0],a;h.className+=" wf-loading";tk.src='https://use.typekit.net/'+config.kitId+'.js';tk.async=true;tk.onload=tk.onreadystatechange=function(){a=this.readyState;if(f||a&&a!="complete"&&a!="loaded")return;f=true;clearTimeout(t);try{Typekit.load(config)}catch(e){}};s.parentNode.insertBefore(tk,s)
    })(document);
    </script>

    <style>
        body {
            margin: 0;
            font-family: "sicyubi-futofuder", sans-serif;
            font-weight: 700;
            font-style: normal;
            background-image: url('BG.png'); 
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
       .container, .maigo-fuda {
            background-color: rgba(255, 255, 255, 0.6) !important;
            border-radius: 15px;
            font-family: "sicyubi-futofuder", sans-serif !important; 
        }

        h2, h3 {
            text-align: center;
            margin-top: -5px !important;    /* ➔ 上の「お店候補」画像との隙間を狭くする */
            margin-bottom: -5px !important; /* ➔ 下の「お店の枠」との隙間を狭くする */
        }

        .order-hint {
            font-family: "sicyubi-futofuder", sans-serif;
            font-size: 34px;
            font-weight: 400;
            margin: 10px 0 10px;
            text-align: center;
        }

        #mission-screen .order-hint {
            font-size: 20px; 
            margin: 10px 0 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mission-unit {/* 迷子札 */
            margin-bottom: 12px ;
            padding-top: 5px;
            padding-bottom: 8px ;
            font-size: 20px; /* ➔ ここを追加！文字を大きくします（24px〜28pxあたりがおすすめ） */
            text-align: center; /* ➔ もし真ん中寄せにしたい場合はこれも入れておくと安心です */
}
        .mission-btns {/* 迷子札    ボタン間隔*/
            display: flex;
            justify-content: space-around;
            gap: 12px;
            margin-top: 8px !important;      /* 文字とボタンの間の余白 */
            margin-bottom: 2px !important;  /* 下の区切り線や次のミッションまでの余白 */
}
        

        /* 画像ボタンのスタイル （達成・失敗）*/
        .m-img-btn {
            height: 40px;          /* ➔ 下のボタンと同じ「45px」に指定して高さを揃える！ */
            width: auto;           /* ➔ 横幅は比率に合わせて自動調整 */
            cursor: pointer;
            transition: transform 0.1s;
        }
.m-img-btn:active {
    transform: scale(0.95); /* 押した時に少し凹む演出 */
}

        .f-img-btn {
            width: auto; /* 下部ボタンの横幅 */
            height: 45px;
            cursor: pointer;
        }

        .footer-btns {
             display: flex;
             flex-direction: column-reverse; /* ➔ 縦並びにして、上下をひっくり返す（店を出るが下になる） */
                align-items: center;            /* ➔ ボタンを真ん中に寄せる */
                gap: 10px;                      /* ➔ ボタンとボタンの間のスキマ */
                margin-top: 15px;
                width: 100%;
        }

/* 選択されたボタン（大きく表示） */
.m-img-btn.selected {
    transform: scale(1.2); /* 1.1倍に拡大 */
    opacity: 1;
}

/* 選択しなかったボタン（暗く表示） */
.m-img-btn.dimmed {
    transform: scale(1); 
    opacity: 0.3; /* 暗くする */
}

        /* 以下、既存のレイアウト維持用CSS */
        header { width: 100%; padding: 30px 0 10px; display: flex; justify-content: center; align-items: center; }
        .container, .maigo-fuda { width: 92%; max-width: 400px; margin: 20px auto; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); box-sizing: border-box; }
     /* 通常のタイトル（ミッション画面の文字など）の間隔を元に戻す */
.section-title {
    text-align: center;
    margin-top: 10px !important;    /* ➔ ここをプラスの数値に戻してボタンとの重なりを解消！ */
    margin-bottom: 10px !important; /* ➔ 文字の下側にも適度な隙間を作る */
    font-size: 1.2rem;
}

#result-screen .section-title {
    margin-top: -32px !important;   /* ➔ お店候補画面のときだけこのマイナスを効かせる */
    margin-bottom: 2px !important;
}
        .shop-card {
            display: flex;
            align-items: center;
            background: #fff;
            border: 2.5px solid rgba(26, 35, 126, 0.5) !important; /* 店情報　枠 */
}
       /* お店情報専用のフォント・サイズ設定 */
        .shop-card {
            height: 100px; /* ➔ カード全体の高さを統一（画像が収まる丁度いい高さ） */
        }

        .shop-card, .shop-card * {
            font-family: sans-serif !important;
            font-weight: normal;
        }
        .shop-card p, 
        .shop-card div:not(.shop-name) { 
            font-size: 0.75rem !important; /* ➔ 文字サイズを少し小さめに（標準は1rem） */
            line-height: 1.3;              /* ➔ 行の間隔を少し詰めてスッキリさせる */
            margin: 3px 0;                 /* ➔ 文字上下の隙間を狭くする */
        }
.result-text {
    font-family: sans-serif !important;
    font-weight: normal !important;
}
/* フェードアウト用のクラス */
.fade-out {
    animation: fadeOut 0.5s ease-out forwards;
}

/* フェードイン用のクラス */
.fade-in {
    animation: fadeIn 0.5s ease-in forwards;
}

/* フェードアウトのアニメーション */
@keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; }
}

/* フェードインのアニメーション */
@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; opacity: 1; }
}

/* ミッション画面の初期状態を非表示にするための調整 */
#mission-screen {
    opacity: 0; /* 最初は透明にしておく */
    transition: opacity 0.5s;
}
/* タイトル画像のサイズと位置の調整 */
.section-title-img {
    text-align: center;
    margin-top: 5px;
    margin-bottom: 5px;
}
.section-title-img img {
    max-width: 140px; /* ➔ 画像が大きすぎる場合は、この数字（200）を小さくして調整してください */
    height: auto;
    display: inline-block;
}
/* リザルト画面の画像ボタン用スタイル */
.result-btns {
    display: flex;
    flex-direction: column; /* ボタンを縦に並べる */
    align-items: center;
    gap: 12px;             /* ボタンとボタンの間のすき間 */
    margin-top: 15px;
}
.res-img-btn {
    height: 45px;          /* ➔ まず2つのボタンの「縦幅」を共通のサイズで固定します！ */
    width: auto;           /* ➔ 横幅は画像の比率を崩さずに自動調整させます */
    cursor: pointer;
    transition: transform 0.1s;
}
.res-img-btn:active {
    transform: scale(0.95);
}
/* ==========================================
   リザルト画面：指令履歴のスタイル
========================================== */

/* 履歴全体のコンテナ */
#result-missions-container {
    margin: 20px auto;
    max-width: 320px;       /* ➔ 画面中央に綺麗に収まる横幅 */
    text-align: left;       /* ➔ はんこと文字を左揃えにする */
    padding: 0 15px;
    display: flex;
    flex-direction: column;
    gap: 12px;              /* ➔ 指令ごとの上下の間隔 */
}

/* 各指令の行 */
.result-mission-item {
    display: flex;
    align-items: center;    /* ➔ はんこと文字の上下中央を揃える */
    font-family: "sicyubi-futofuder", sans-serif; /* ➔ 筆文字フォント */
    font-size: 16px;
    font-weight: bold;
    color: #000;
    min-height: 36px;       /* ➔ 行の最低の高さを揃えてガタつき防止 */
}

/* 達成はんこ（stamp.png） */
.result-stamp {
    height: 36px;           /* ➔ 文字の大きさに合わせたサイズ */
    width: auto;
    margin-right: 12px;     /* ➔ はんこと文字の間の隙間 */
    flex-shrink: 0;         /* ➔ 画像が横に潰れるのを防ぐ */
}

/* ❌ 失敗したミッション */
.result-mission-item.failed {
    opacity: 0.25;          /* ➔ 不透明度を下げて薄く（グレーアウト）する */
    /* 🔥 はんこが無い分、文字の開始位置を右にずらして、成功した行と頭を揃える */
    padding-left: 44px;     /* 「はんこの高さ(32px) + 隙間(12px)」と同じ数値 */
}
    </style>
</head>

<body>

<div id="mission-screen" class="container" style="display: none;">
    <div class="section-title-img"><img src="shop.png" alt="お店"></div>
    <div id="selected-shop-card"></div>

    <div id="first-mission-unit" class="mission-unit" style="margin-top:20px; border-top:1px dashed #ccc; padding-top:20px;">
    <div class="section-title-img"><img src="plate.png" alt="迷子札"></div>
    <div id="mission-drink-hint" class="order-hint"></div>
    <div class="mission-btns">
    <img src="fail.png" class="m-img-btn" onclick="selectResult(this, false)" alt="失敗">
    <img src="achievement.png" class="m-img-btn" onclick="selectResult(this, true)" alt="達成">
</div>
</div>

    <div id="dynamic-mission-container"></div>

    <div class="footer-btns">
        <img src="exit.png" class="f-img-btn" onclick="showResult()" alt="店を出る">
        <img src="next.png" class="f-img-btn" onclick="getNextMission()" alt="次の迷子札">
    </div>
    <!-- ⬇️ ここからリザルト画面（最初は非表示） ⬇️ -->
    <div id="result-screen" style="display: none; text-align: center; margin-top: 20px; border-top: 2px dashed #1a237e; padding-top: 20px;">
        <div class="section-title-img"><img src="result.png" alt="リザルト"></div>
        <div id="result-summary" style="font-size: 1.2rem; margin-bottom: 20px;"></div>
        <div id="result-missions-container"></div>

        <div class="result-btns">
    <!-- もう一度迷子になるボタン -->
    <img src="more.png" class="res-img-btn" onclick="location.reload()" alt="もう一度迷子になる">
    
    <!-- ポストするボタン -->
    <img src="post.png" class="res-img-btn" onclick="shareToX()" alt="Xポスト">
    <img src="logo.png" style="width: 100px; height: auto; margin-top: 20px; display: block; margin-left: auto; margin-right: auto;">
</div>
    </div>

</div>

<header>
    <div class="logo-area">
        <img src="logo.png" alt="呑み迷子" style="width: 150px; height: auto;">
    </div>
</header>

<div class="container">
    <div class="section-title-img"><img src="shoplist.png" alt="お店候補"></div>
    <div id="shop-list"></div> 
</div>

<div class="maigo-fuda">
    <div class="section-title-img"><img src="plate.png" alt="迷子札"></div>
    <div id="drink-hint" class="order-hint">一杯目、何飲む？</div>
</div>

<div id="button-container" style="text-align: center;">
    <img id="action-button" src="search.png" onclick="startGacha()" style="cursor: pointer; width: 300px; max-width: 80%;">
</div>


<script>
// 1. お店を表示する関数
function displayShops(data, currentRange) {
    const shopList = document.getElementById('shop-list');
    const hint = document.getElementById('drink-hint');
    const drinks = ["生ビール", "ハイボール", "レモンサワー", "日本酒", "焼酎", "ウーロンハイ", "カシオレ", "トマトハイ"];

    // 迷子札の内容を決定
    if (hint) {
        const randomDrink = drinks[Math.floor(Math.random() * drinks.length)];
        hint.innerText = "一杯目は" + randomDrink;
    }

    if (!shopList) return;
    shopList.innerHTML = "";

    if (!data || !data.results || !data.results.shop || data.results.shop.length === 0) {
        shopList.innerHTML = '<p style="text-align:center;">近くにお店が見つかりませんでした。</p>';
        return;
    }

    // 検索範囲を表示
    const rangeText = document.createElement('p');
    rangeText.style = "font-size:0.8rem; color:#666; text-align:center;　font-family: serif;";
    rangeText.innerText = `(${currentRange}以内の結果)`;
    shopList.appendChild(rangeText);

    // 3件ランダムに抽出
    const shops = data.results.shop.sort(() => 0.5 - Math.random()).slice(0, 3);

    shops.forEach(shop => {
        const shopCard = document.createElement('div');
        shopCard.className = 'shop-card';
        shopCard.style = "display:flex; align-items:center; background:#fff; border:1px solid #1a237e; margin-bottom:10px; padding:10px; cursor:pointer; border-radius:10px;";

        shopCard.innerHTML = `
            <img src="${shop.photo.pc.l}" style="width:80px; height:80px; object-fit:cover; margin-right:15px; border-radius:10px;">
            <div style="flex:1;">
                <div class="shop-desc" style="font-weight:bold; margin-bottom:5px;">${shop.name}</div>
                <div class="shop-desc">${shop.genre.name}<br>${shop.access}</div>
            </div>
        `;

        // お店をクリックした時の処理
        shopCard.onclick = () => {

    const selectors = ['header', '.container', '.maigo-fuda', '#button-container'];

    selectors.forEach(sel => {
        document.querySelectorAll(sel).forEach(el => {
            if (!document.getElementById('mission-screen').contains(el)) {
                el.classList.add('fade-out');
            }
        });
    });

    setTimeout(() => {

        selectors.forEach(sel => {
            document.querySelectorAll(sel).forEach(el => {
                if (!document.getElementById('mission-screen').contains(el)) {
                    el.style.display = 'none';
                }
            });
        });

        const selectedPlace = document.getElementById('selected-shop-card');
        selectedPlace.innerHTML = '';
        selectedPlace.appendChild(shopCard.cloneNode(true));

        const hint = document.getElementById('drink-hint');
        const missionDrinkHint = document.getElementById('mission-drink-hint');

        missionDrinkHint.innerText =
            hint.innerText.replace("一杯目は", "一杯目に") + " を頼め";

        const missionScreen = document.getElementById('mission-screen');
        missionScreen.style.display = 'block';
        missionScreen.classList.add('fade-in');

    }, 500);
};

        shopList.appendChild(shopCard);
    });
}  // ← displayShops 関数の終わり（ここが抜けていたのが主な原因）

// 2. 次のミッションを追加する関数
function getNextMission() {
    const container = document.getElementById('dynamic-mission-container');
    if (!container) return;

    const tasks = [
        "店主のおすすめを聞け",
        "隣の人と乾杯せよ",
        "本日のおすすめを注文せよ",
        "一番人気のつまみを頼め",
        "店員さんの名前を覚えろ",
        "揚げ物を1品頼め",
        "自分以外が頼んだ酒を頼め",
        "おすすめの日本酒を聞け"
    ];
    const randomTask = tasks[Math.floor(Math.random() * tasks.length)];

    const newMission = document.createElement('div');
    newMission.className = 'mission-unit';
    newMission.style.cssText = "margin-top:10px; border-top:1px dashed #ccc; padding-top:10px;";

    newMission.innerHTML = `
        <h3 class="order-hint">${randomTask}</h3>
        <div class="mission-btns">
            <img src="fail.png" class="m-img-btn" onclick="selectResult(this, false)" alt="失敗">
            <img src="achievement.png" class="m-img-btn" onclick="selectResult(this, true)" alt="達成">
        </div>
    `;

    container.appendChild(newMission);
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

// 3. データ取得
async function fetchAndDisplay(lat, lng, rangeIndex = 1) {
    const shopList = document.getElementById('shop-list');
    const rangeLabels = {1: "300m", 2: "500m", 3: "1000m"};
    if (shopList) shopList.innerHTML = `<p style="text-align:center;">${rangeLabels[rangeIndex]}圏内を探索中...</p>`;

   try {
    const response = await fetch(`/getShops?lat=${lat}&lng=${lng}&range=${rangeIndex}`);
    const data = await response.json();

    // ★ここに移動する★
    const shopCount = data?.results?.shop?.length || 0;
    if (shopCount < 3 && rangeIndex < 3) {
        return fetchAndDisplay(lat, lng, rangeIndex + 1);
    }

    displayShops(data, rangeLabels[rangeIndex]);
} catch (e) {
        if (shopList) shopList.innerHTML = '<p style="text-align:center;">通信エラーが発生しました。</p>';
    }
}

// 4. ガチャ開始
function startGacha() {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => fetchAndDisplay(pos.coords.latitude, pos.coords.longitude),
            () => alert("位置情報を許可してください")
        );
    }
}

function selectResult(button, isSuccess) {
    const parent = button.closest('.mission-btns');
    if (!parent) return;

    const buttons = parent.querySelectorAll('.m-img-btn');

    buttons.forEach(btn => btn.classList.remove('selected', 'dimmed'));

    button.classList.add('selected');
    buttons.forEach(btn => {
        if (btn !== button) {
            btn.classList.add('dimmed');
        }
    });
}

// 5. リザルト画面を表示する関数
function showResult() {
    // 達成と失敗の数を数える
    const totalMissions = document.querySelectorAll('.mission-unit').length;
    const successCount = document.querySelectorAll('.m-img-btn.selected[alt="達成"]').length;
    
    // 🌟 履歴（指令とはんこ）を生成してリザルト画面に流し込む
    const missionsContainer = document.getElementById('result-missions-container');
    if (missionsContainer) {
        missionsContainer.innerHTML = ''; // リセット
        
        document.querySelectorAll('.mission-unit').forEach(unit => {
            // ミッションのテキストを取得（h3 や p、.order-hint など適切な要素から文字を抜く）
            const textElement = unit.querySelector('.order-hint') || unit.querySelector('h3') || unit.querySelector('p');
            if (!textElement) return;
            const missionText = textElement.innerText.trim();

            // 達成ボタンが選ばれているか判定
            const isSuccess = unit.querySelector('.m-img-btn.selected[alt="達成"]') !== null;

            // HTMLの組み立て
            const item = document.createElement('div');
            item.classList.add('result-mission-item');

            if (isSuccess) {
                item.innerHTML = `
                    <img src="stamp.png" class="result-stamp" alt="達成">
                    <span class="result-mission-text">${missionText}</span>
                `;
            } else {
                item.classList.add('failed');
                item.innerHTML = `
                    <span class="result-mission-text">${missionText}</span>
                `;
            }
            missionsContainer.appendChild(item);
        });
    }
    // お店の名前を取得
    const shopName = document.querySelector('#selected-shop-card .shop-desc')?.innerText || "居酒屋";

    // 結果のメッセージを作る
    const resultSummary = document.getElementById('result-summary');
    resultSummary.innerHTML = `
        <p><strong>${shopName}</strong> <br>での呑みが終了しました！</p>
        <p style="font-size: 1.5rem; color: #1a237e; font-weight: bold;">
            ミッション達成率: ${successCount} / ${totalMissions}
        </p>
        <p>${successCount === totalMissions ? 'パーフェクト！<br>素晴らしい呑みっぷりです！' : 'お疲れ様でした！<br>次も楽しく呑みましょう！'}</p>
    `;

    // 途中のミッションやボタンのエリアを非表示にする
    document.getElementById('first-mission-unit').style.display = 'none';
    document.getElementById('dynamic-mission-container').style.display = 'none';
    document.querySelector('.footer-btns').style.display = 'none';

    // リザルト画面を表示する
    document.getElementById('result-screen').style.display = 'block';
}
// X（Twitter）にシェアする機能
function shareToX() {
    const text = encodeURIComponent("呑み迷子で新しい居酒屋を開拓中！\n今日のミッション達成率");
    const url = encodeURIComponent(window.location.href); // アプリのURL（自動取得）
    
    // Xのポスト画面を別タブで開く
    window.open(`https://twitter.com/intent/tweet?text=${text}&url=${url}`, '_blank');
}
</script>
